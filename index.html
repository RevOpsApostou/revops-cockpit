<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<!-- App já é dark nativo: trava o Dark Reader (e similares) p/ não "clarear" fundos escuros (ex.: caixa do tooltip) -->
<meta name="darkreader-lock">
<title>RevOps Cockpit — Apostou</title>
<!-- Aquece a conexão com o endpoint de dados (Apps Script → googleusercontent) p/ o 1º fetch conectar antes. -->
<link rel="preconnect" href="https://script.google.com" crossorigin>
<link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- SheetJS: carregado SOB DEMANDA no export (ensureXLSX_), não em todo load — tira ~1MB do carregamento. -->

<style>
  :root {
    --bg: #000000;
    --surface: #0c0c0c;
    --surface-2: #141414;
    --border: #1f1f1f;
    --border-strong: #2a2a2a;
    --text: #f5f5f5;
    --text-muted: #888888;
    --text-dim: #555555;
    --positive: #4ade80;
    --warning: #fbbf24;
    --negative: #f87171;
    --accent: #60a5fa;
    --accent-yellow: #facc15;
    --accent-orange: #f97316;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px; border-bottom: 1px solid var(--border);
    /* z acima do .slicer (z-11): o popover de export (Excel) é filho da topbar e cai
       sobre a linha do slicer — sem isso o slicer inteiro pinta por cima do popover. */
    position: sticky; top: 0; z-index: 12; background: var(--bg);
    flex-wrap: wrap; gap: 12px;
  }
  .brand { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .brand span { color: var(--text-muted); font-weight: 400; }
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .meta-chip {
    font-size: 11px; color: var(--text-muted);
    background: var(--surface-2); padding: 6px 12px;
    border-radius: 6px; border: 1px solid var(--border);
  }
  .meta-chip strong { color: var(--text); font-weight: 600; }
  .mock-chip {
    font-size: 11px; color: var(--warning);
    background: rgba(251, 191, 36, .08); padding: 6px 12px;
    border-radius: 6px; border: 1px solid rgba(251, 191, 36, .3);
  }
  .user-chip {
    font-size: 11px; color: var(--text); background: var(--surface-2);
    padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border-strong);
  }
  .logout-btn {
    font-size: 11px; color: var(--text-muted); background: transparent;
    padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
    cursor: pointer; font-family: inherit;
  }
  .logout-btn:hover { color: var(--text); border-color: var(--border-strong); }
  /* Tela de login */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-card {
    width: 320px; max-width: 100%; display: flex; flex-direction: column; gap: 12px;
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: 12px; padding: 32px 28px;
  }
  .login-title { font-size: 20px; font-weight: 700; color: var(--text); }
  .login-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .login-card input {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    padding: 11px 12px; border-radius: 8px; font-size: 14px; font-family: inherit;
  }
  .login-card input:focus { outline: none; border-color: var(--border-strong); }
  .login-card button {
    margin-top: 4px; padding: 11px; border-radius: 8px; border: none; cursor: pointer;
    background: var(--text); color: var(--bg, #000); font-weight: 600; font-size: 14px; font-family: inherit;
  }
  .login-card button:disabled { opacity: .5; cursor: default; }
  .login-err { font-size: 12px; color: var(--negative); }
  .refresh-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-muted); font-family: inherit;
    background: var(--surface-2); padding: 6px 12px;
    border-radius: 6px; border: 1px solid var(--border);
    cursor: pointer; transition: all .15s;
  }
  .refresh-btn:hover:not(:disabled) { color: var(--text); border-color: var(--border-strong); }
  .refresh-btn:disabled { opacity: .55; cursor: not-allowed; }
  .refresh-btn svg { width: 13px; height: 13px; }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* DATE SLICER ROW */
  .slicer {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 32px; border-bottom: 1px solid var(--border);
    background: var(--bg); flex-wrap: wrap;
    /* acima da .tabs (z-9): senão o painel do multiselect de CANAL, preso no stacking
       context da .slicer, fica coberto pela barra de abas. Abaixo da .topbar (z-12) de
       propósito, p/ o popover de export (filho da topbar) cair sobre o slicer. */
    position: sticky; top: 65px; z-index: 11;
  }
  .slicer-group { display: flex; align-items: center; gap: 8px; }
  .slicer label {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .05em; font-weight: 600;
  }
  /* Secondary (tab-level) slicers default to ORANGE; the global top bar (.slicer-main) is overridden back to yellow below. */
  .slicer input[type="date"] {
    background: rgba(249, 115, 22, .07); border: 1px solid rgba(249, 115, 22, .5);
    color: var(--text); font-family: inherit; font-size: 12px;
    padding: 6px 10px; border-radius: 6px; outline: none;
    color-scheme: dark;
  }
  .slicer input[type="date"]:focus { border-color: var(--accent-orange); }
  .slicer select {
    background: var(--surface); border: 1px solid rgba(249, 115, 22, .5);
    color: var(--text); font-family: inherit; font-size: 12px;
    padding: 6px 10px; border-radius: 6px; outline: none;
    cursor: pointer; color-scheme: dark; max-width: 220px;
  }
  .slicer select:focus { border-color: var(--accent-orange); }
  /* opções do dropdown nativo: força fundo escuro + texto claro (o bg amarelo
     do select vazava pro popup e deixava as opções ilegíveis) */
  .slicer select option { background: var(--surface); color: var(--text); }
  /* GLOBAL top slicer keeps the yellow accent (MTD/diário/7d/30d, Canal, Growth/Total Casa) */
  .slicer-main input[type="date"] { background: rgba(250, 204, 21, .06); border-color: rgba(250, 204, 21, .45); }
  .slicer-main input[type="date"]:focus { border-color: var(--accent-yellow); }
  .slicer-main select { border-color: rgba(250, 204, 21, .45); }
  .slicer-main select:focus { border-color: var(--accent-yellow); }
  .slicer-divider { width: 1px; height: 24px; background: var(--border); }
  .slicer-arrow { color: var(--text-dim); font-size: 12px; }
  .slicer-presets { display: flex; gap: 4px; margin-left: 6px; }
  .preset-btn {
    background: rgba(249, 115, 22, .07); border: 1px solid rgba(249, 115, 22, .5);
    color: var(--text-muted); padding: 6px 12px; font-size: 11px;
    border-radius: 6px; cursor: pointer; font-family: inherit;
    transition: all .15s;
  }
  .preset-btn:hover { color: var(--text); border-color: rgba(249, 115, 22, .7); }
  .preset-btn.active { background: var(--accent-orange); color: #000; border-color: var(--accent-orange); font-weight: 600; }
  /* GLOBAL top slicer presets stay yellow */
  .slicer-main .preset-btn { background: rgba(250, 204, 21, .06); border-color: rgba(250, 204, 21, .45); }
  .slicer-main .preset-btn:hover { border-color: rgba(250, 204, 21, .5); }
  .slicer-main .preset-btn.active { background: var(--accent-yellow); border-color: var(--accent-yellow); }
  .apply-btn {
    background: var(--accent-yellow); border: none; color: #000;
    padding: 7px 16px; font-size: 12px; font-weight: 600;
    border-radius: 6px; cursor: pointer; font-family: inherit;
    margin-left: auto;
  }
  .apply-btn:disabled { opacity: .4; cursor: not-allowed; }
  .apply-btn:hover:not(:disabled) { opacity: .9; }
  .tabs {
    display: flex; gap: 2px; padding: 0 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg); overflow-x: auto;
    position: sticky; top: 126px; z-index: 9;
  }
  .tab-btn {
    background: transparent; border: none; color: var(--text-muted);
    padding: 14px 18px; font-size: 13px; font-weight: 500;
    cursor: pointer; border-bottom: 2px solid transparent;
    font-family: inherit; white-space: nowrap;
    transition: color .15s, border-color .15s;
  }
  .tab-btn:hover { color: var(--accent-yellow); }
  .tab-btn.active { color: var(--accent-yellow); border-bottom-color: var(--accent-yellow); }
  main {
    padding: 40px 32px 60px;
    max-width: 1600px; margin: 0 auto;
  }
  .tab-header {
    margin-bottom: 32px; display: flex;
    align-items: baseline; justify-content: space-between; gap: 12px;
    flex-wrap: wrap;
  }
  .tab-header h1 {
    font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
  }
  .tab-header .subtitle {
    color: var(--text-muted); font-size: 13px; margin-top: 6px;
  }
  /* Régua de filtros da seção "Retenções por faixa de FTD": congela abaixo da
     barra de abas (top:126 + ~46 de altura das abas) ao rolar a seção. */
  .slicer-ruler {
    position: sticky; top: 174px; z-index: 8;
    background: var(--bg); flex-wrap: wrap;
    margin: 0 -32px 28px; padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    box-shadow: 0 6px 14px -10px rgba(0, 0, 0, .7);
  }
  /* HERO KPI GRID — 3 grandes cards */
  .hero-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 16px; margin-bottom: 36px;
  }
  .hero {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px 26px;
    position: relative;
    transition: border-color .15s, transform .15s;
  }
  .hero:hover { border-color: var(--border-strong); }
  .hero .head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .hero .label {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .07em;
    font-weight: 600;
  }
  .hero .farol-dot {
    width: 15px; height: 15px; border-radius: 50%;
    box-shadow: 0 0 14px currentColor;
  }
  .hero .farol-dot.verde { background: var(--positive); color: var(--positive); }
  .hero .farol-dot.amarelo { background: var(--warning); color: var(--warning); }
  .hero .farol-dot.vermelho { background: var(--negative); color: var(--negative); }
  .hero .farol-dot.cinza { background: var(--text-dim); color: transparent; box-shadow: none; }
  .hero .value {
    font-size: 38px; font-weight: 700; letter-spacing: -0.03em;
    line-height: 1.05; margin-bottom: 18px;
  }
  /* Progress bar vs BP */
  .vs-bp { margin-top: 4px; }
  .vs-bp-head {
    display: flex; justify-content: space-between;
    margin-bottom: 6px; font-size: 11px; color: var(--text-muted);
  }
  .vs-bp-head .bp-label { color: var(--text-dim); }
  .vs-bp-head .bp-val { color: var(--text); font-weight: 700; font-size: 12.5px; font-variant-numeric: tabular-nums; }
  .vs-bp-head .pct { font-weight: 600; font-variant-numeric: tabular-nums; }
  .vs-bp-head .pct.verde { color: var(--positive); }
  .vs-bp-head .pct.amarelo { color: var(--warning); }
  .vs-bp-head .pct.vermelho { color: var(--negative); }
  .vs-bp-track {
    height: 4px; background: var(--surface-2);
    border-radius: 2px; overflow: hidden; position: relative;
  }
  .vs-bp-fill {
    height: 100%; border-radius: 2px;
    transition: width .4s ease;
  }
  .vs-bp-fill.verde { background: var(--positive); }
  .vs-bp-fill.amarelo { background: var(--warning); }
  .vs-bp-fill.vermelho { background: var(--negative); }
  .vs-bp-fill.cinza { background: var(--text-dim); }
  .vs-bp-mark {
    position: absolute; top: -2px; bottom: -2px;
    width: 1px; background: var(--text-muted); opacity: .5;
  }
  .delta-m1 {
    margin-top: 12px; font-size: 11px; color: var(--text-muted);
  }
  /* Posição do M-1 (mesmo período do mês anterior) — NÃO é variação, então sem seta/cor de tendência */
  .delta-m1 .m1-val { color: var(--text-dim); font-weight: 600; }
  /* Trend = projeção de fechamento do mês (MTD × dias-do-mês/decorridos) */
  .trend-line {
    margin-top: 10px; display: flex; align-items: baseline; gap: 8px;
    font-size: 11px; color: var(--text-muted);
    padding-top: 8px; border-top: 1px dashed var(--border);
  }
  .trend-line .trend-tag { color: var(--text-dim); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
  .trend-line .trend-val { color: var(--text); font-weight: 700; font-size: 12.5px; font-variant-numeric: tabular-nums; }
  .trend-line .trend-pct { font-weight: 600; font-variant-numeric: tabular-nums; margin-left: auto; }
  .trend-line .trend-pct.verde { color: var(--positive); }
  .trend-line .trend-pct.amarelo { color: var(--warning); }
  .trend-line .trend-pct.vermelho { color: var(--negative); }
  .trend-line .trend-pct.cinza { color: var(--text-dim); }
  /* Channel table */
  .table-scroll { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  /* Tabelas diárias longas (Safras, Ret.Faixa): scroll vertical próprio + cabeçalho/rodapé fixos.
     A moldura (borda/raio) vai pro wrapper porque .ch-table tem overflow:hidden, que quebraria o sticky. */
  .table-scroll.tall {
    max-height: 620px; overflow: auto;
    border: 1px solid var(--border); border-radius: 10px;
    scrollbar-gutter: stable;   /* reserva a calha da scrollbar — não deixa a barra sobrepor o header */
  }
  .table-scroll.tall .ch-table { border: none; border-radius: 0; overflow: visible; }
  .table-scroll.tall thead th { position: sticky; top: 0; z-index: 2; }
  /* tfoot NÃO é sticky (o sticky-bottom glitchava e o Total colava no header). Total rola no fim. */
  .ch-table {
    width: 100%; border-collapse: collapse;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .ch-table th, .ch-table td {
    padding: 11px 16px; text-align: right;
    font-size: 12px; border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .ch-table th:first-child, .ch-table td:first-child {
    text-align: left; min-width: 90px;
  }
  .ch-table thead th {
    background: var(--surface-2); color: var(--text-muted);
    font-size: 10px; text-transform: uppercase; letter-spacing: .05em;
    font-weight: 600;
  }
  .ch-table tbody tr:hover { background: rgba(255,255,255,.02); }
  .ch-table tbody tr:last-child td { border-bottom: none; }
  .ch-table tfoot td {
    background: var(--surface-2); font-weight: 700;
    color: var(--text); border-top: 1px solid var(--border-strong);
  }
  .ch-name { color: var(--text); font-weight: 600; }
  .ch-roas-pos { color: var(--positive); font-weight: 600; }
  .ch-roas-neg { color: var(--negative); font-weight: 600; }
  /* Faixas do farol (rodapé) aplicadas às células vs BP: ≥95% verde · 85–94% amarelo · <85% vermelho */
  .ch-band-verde { color: var(--positive); font-weight: 600; }
  .ch-band-amarelo { color: var(--warning); font-weight: 600; }
  .ch-band-vermelho { color: var(--negative); font-weight: 600; }
  /* Supporting section */
  .support {
    margin-top: 8px;
  }
  /* Ativação D0: funil + distribuição lado a lado; empilha no mobile */
  .ativ-two-col {
    display: grid; grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
    gap: 20px; margin-top: 8px;
  }
  @media (max-width: 720px) { .ativ-two-col { grid-template-columns: 1fr; } }
  .support-title {
    font-size: 12px; font-weight: 600;
    color: var(--text-muted); text-transform: uppercase;
    letter-spacing: .08em; margin-bottom: 14px;
  }
  .ch-note {
    margin-top: 12px; font-size: 11px; line-height: 1.6;
    color: var(--text-dim); max-width: 880px;
  }
  .ch-note strong { color: var(--text-muted); font-weight: 600; }
  /* FTD bridge (waterfall BP → Realizado) */
  .bridge-head { display: flex; align-items: baseline; gap: 8px 16px; flex-wrap: wrap; margin-bottom: 18px; }
  .bridge-head .b-act { font-size: 22px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .bridge-head .b-bp { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .bridge-head .b-delta { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .bridge-head .b-delta.verde { color: var(--positive); }
  .bridge-head .b-delta.amarelo { color: var(--warning); }
  .bridge-head .b-delta.vermelho { color: var(--negative); }
  .bridge-head .b-delta.cinza { color: var(--text-muted); }
  .bridge-head .b-extra { font-size: 11px; color: var(--text-dim); }
  .bridge-toggle { margin-left: auto; display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; align-self: center; }
  .bridge-toggle button { background: transparent; border: none; color: var(--text-muted); font-family: inherit; font-size: 11px; padding: 4px 11px; cursor: pointer; }
  .bridge-toggle button:hover { color: var(--text); }
  .bridge-toggle button.active { background: var(--accent-yellow); color: #000; font-weight: 600; }
  .bridge-svg { display: block; }
  .bridge-svg text { font-variant-numeric: tabular-nums; }
  /* Composition bars */
  .hbar-list { display: flex; flex-direction: column; gap: 12px; }
  .hbar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
  }
  .hbar-head {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 10px;
  }
  .hbar-label { font-size: 13px; color: var(--text); font-weight: 500; }
  .hbar-value {
    font-size: 13px; font-weight: 600; color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .hbar-value .secondary {
    color: var(--text-muted); margin-left: 8px; font-weight: 400;
  }
  .hbar-track {
    height: 8px; background: var(--surface-2);
    border-radius: 4px; overflow: hidden;
  }
  .hbar-fill {
    height: 100%; border-radius: 4px;
    background: var(--accent);
    transition: width .3s ease;
  }
  /* Footer */
  .footer {
    margin-top: 48px; padding-top: 20px;
    border-top: 1px solid var(--border);
    color: var(--text-dim); font-size: 11px;
    text-align: center;
  }
  .farol-key {
    display: inline-flex; align-items: center; gap: 5px;
    margin-right: 14px; font-size: 11px; color: var(--text-muted);
  }
  .farol-key .dot { width: 7px; height: 7px; border-radius: 50%; }
  .farol-key .dot.verde { background: var(--positive); }
  .farol-key .dot.amarelo { background: var(--warning); }
  .farol-key .dot.vermelho { background: var(--negative); }
  @media (max-width: 900px) {
    .hero-grid { grid-template-columns: 1fr; }
    main { padding: 28px 18px 48px; }
    /* Once the top bars wrap, their heights no longer match the hard-coded
       sticky offsets (65px / 126px) and they overlap. Let topbar + slicer
       scroll away and pin only the tab bar. */
    .topbar { position: static; padding: 12px 18px; }
    .slicer { position: static; top: auto; }
    .tabs { position: sticky; top: 0; padding: 0 18px; }
    /* abas agora fixam no topo:0 → régua encosta logo abaixo delas */
    .slicer-ruler { top: 45px; margin: 0 -18px 22px; padding: 12px 18px; }
    .hero .value { font-size: 32px; }
  }
  @media (max-width: 600px) {
    html, body { font-size: 12.5px; }
    .topbar { padding: 11px 16px; gap: 8px; }
    .brand { font-size: 17px; }
    .controls { gap: 6px; }
    .slicer { padding: 12px 16px; gap: 10px; }
    .tabs { padding: 0 12px; }
    .slicer-ruler { top: 42px; margin: 0 -16px 18px; padding: 10px 16px; }
    .tab-btn { padding: 13px 14px; }
    main { padding: 22px 16px 44px; }
    .tab-header { margin-bottom: 22px; }
    .tab-header h1 { font-size: 21px; }
    .hero { padding: 18px; }
    .hero .value { font-size: 30px; }
    /* Stack each filter group onto its own full-width row */
    .slicer-group { flex: 1 1 100%; flex-wrap: wrap; }
    .slicer-group select,
    .slicer-group input[type="date"] { flex: 1 1 130px; min-width: 0; max-width: none; }
    .slicer-divider { display: none; }
    .slicer-presets { flex-wrap: wrap; }
    .apply-btn { flex: 1 1 100%; }
    .ch-table th, .ch-table td { padding: 9px 11px; font-size: 11.5px; }
    .ch-table thead th { font-size: 9.5px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script id="app-bundle">
// GERADO por build.js a partir de app.jsx — NÃO EDITAR AQUI. Edite app.jsx e rode: node build.js
const {
  useState,
  useEffect
} = React;

// Estado persistido em localStorage (sobrevive a refresh / troca de aba / sair e voltar).
function usePersistedState(key, initial) {
  const [v, setV] = React.useState(() => {
    try {
      const s = window.localStorage.getItem(key);
      return s != null ? JSON.parse(s) : initial;
    } catch (e) {
      return initial;
    }
  });
  React.useEffect(() => {
    try {
      window.localStorage.setItem(key, JSON.stringify(v));
    } catch (e) {}
  }, [key, v]);
  return [v, setV];
}

// ===== AUTH (front) — sessão validada no backend (doPost). Token em localStorage; os
// fetches de dados (GET) mandam &session=<tok> via authParam_(). Login/admin via apiPost_.
const SESSION_KEY = 'rvops:session';
const USER_KEY = 'rvops:user';
function authParam_() {
  const s = localStorage.getItem(SESSION_KEY);
  return 'session=' + encodeURIComponent(s || '');
}
function apiPost_(payload) {
  return fetch(ENDPOINT_URL, {
    method: 'POST',
    body: JSON.stringify(payload)
  }).then(r => r.json());
}

// DATE HELPERS — presets + parsing
// ============================================================
// YYYY-MM-DD a partir dos componentes LOCAIS (sem passar por UTC, que jogaria
// a data 1 dia pra trás em fusos UTC+). Sempre reflete o calendário de quem abre.
function toLocalISO_(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

  const t = new Date();
  return toLocalISO_(new Date(t.getFullYear(), t.getMonth(), t.getDate() - 1));

  return toLocalISO_(new Date(d.getFullYear(), d.getMonth(), 1));
}

  const end = new Date(t.getFullYear(), t.getMonth(), 0);

    from: toLocalISO_(start),
    to: toLocalISO_(end)
  };
}

  const start = new Date(y, m - 2, 1); // 1º dia do mês anterior
  const end = new Date(y, m - 1, 0); // dia 0 do mês da janela = último dia do anterior
  return {
    from: toLocalISO_(start),
    to: toLocalISO_(end)
  };
}

  const t = new Date();
  return toLocalISO_(new Date(t.getFullYear(), t.getMonth(), t.getDate() - n));
}
function fmtBR_(iso) {
  if (!iso) return '—';

  return `${d}/${m}/${y}`;
}
const MESES_PT_ = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];

// ============================================================
// MOCK HERO FILTERING — no live o backend filtra de verdade;
// no mock derivamos os heroes das tabelas mock pro preview reagir igual.
// ============================================================
function sumBy_(list, f) {
  return (list || []).reduce((a, c) => a + (f(c) || 0), 0);
}
function deriveMockM_(M, filter) {
  const selCh = chList_(filter);
  if (!selCh.length && filter.scope !== 'growth') return M;
  const inSel = selCh.length ? c => selCh.includes(c.channel) : c => isGrowthCh_(c.channel);
  const pick = list => list.filter(inSel);
  const ch = pick(MOCK_CHANNELS, c => c.spend != null);
  const gg = pick(MOCK_GGR_CHANNELS, c => c.spend != null);
  const dp = pick(MOCK_DEPM0_CHANNELS, c => c.invest != null);
  const rt = pick(MOCK_RETENTION_CHANNELS, null);
  const rm = pick(MOCK_ROLLOVER_MATRIX.rows, null);
  const ftd = sumBy_(ch, c => c.ftdAmount);
  const spend = sumBy_(ch, c => c.spend);
  const ggr = sumBy_(gg, c => c.ggr);
  const depM0 = sumBy_(dp, c => c.depM0);
  const depM0Growth = sumBy_(dp.filter(c => c.invest != null), c => c.depM0);
  const ggrShare = sumBy_(MOCK_GGR_CHANNELS, c => c.ggr) > 0 ? ggr / sumBy_(MOCK_GGR_CHANNELS, c => c.ggr) : 1;
  const depShare = sumBy_(MOCK_DEPM0_CHANNELS, c => c.depM0) > 0 ? depM0 / sumBy_(MOCK_DEPM0_CHANNELS, c => c.depM0) : 1;
  const W = sumBy_(rt, c => c.m0Total);
  const wavg = key => W > 0 ? sumBy_(rt, c => (c[key] || 0) * (c.m0Total || 0)) / W : null;
  const RW = sumBy_(rm, r => r.weight);
  const rollover = RW > 0 ? sumBy_(rm, r => (r.total || 0) * (r.weight || 0)) / RW : null;

  // set: novo act, escala m1 na mesma proporção (mantém o delta coerente no mock)
  const set = (m, v) => {
    const f = m.act != null && m.act !== 0 && v != null ? v / m.act : null;
    return {
      ...m,
      act: v,
      m1: f != null && m.m1 != null ? m.m1 * f : m.m1
    };
  };
  const scale = (m, f) => set(m, m.act != null ? m.act * f : null);
  return {
    ...M,
    ftdAmount: set(M.ftdAmount, ftd || null),
    roasFtd: set(M.roasFtd, spend > 0 ? ftd / spend : null),
    invest: set(M.invest, spend > 0 ? spend : null),
    ggr: set(M.ggr, ggr || null),
    ggrTrend: scale(M.ggrTrend, ggrShare),
    depTotal: scale(M.depTotal, depShare),
    depM0Total: set(M.depM0Total, depM0 || null),
    depM0Growth: set(M.depM0Growth, depM0Growth || null),
    retM0M1: set(M.retM0M1, wavg('m0m1')),
    retM1M2: set(M.retM1M2, wavg('m1m2')),
    retM3plus: set(M.retM3plus, wavg('m3plus')),
    turnover: scale(M.turnover, ggrShare),
    rollover: set(M.rollover, rollover)
  };
}

// Live: deriva os hero cards do canal/scope a partir dos componentes por canal (exato, mesma fonte do backend).
function deriveLiveM_(M, filter, comp, retCh, depCh, bp) {
  const selList = chList_(filter);
  if (!selList.length && filter.scope !== 'growth' || !comp) return M; // Total da Casa: backend já setou BP
  const inSel = selList.length ? ch => selList.includes(ch) : ch => isGrowthCh_(ch);
  const sel = Object.keys(comp).filter(inSel);
  const sum = (bk, key) => sel.reduce((a, ch) => {
    const c = comp[ch] && comp[ch][bk];
    return a + (c && c[key] || 0);
  }, 0);
  const ngr = sum('mtd', 'ngr'),
    dep = sum('mtd', 'depositos'),
    turn = sum('mtd', 'turnover'),
    spend = sum('mtd', 'spend'),
    ftdAmt = sum('mtd', 'ftdAmount');
  const lNgr = sum('lm', 'ngr'),
    lDep = sum('lm', 'depositos'),
    lTurn = sum('lm', 'turnover'),
    lSpend = sum('lm', 'spend'),
    lFtdAmt = sum('lm', 'ftdAmount');
  const div = (a, b) => b > 0 ? a / b : null;
  const trendF = M.ggr && M.ggr.act && M.ggrTrend && M.ggrTrend.act != null ? M.ggrTrend.act / M.ggr.act : null;

  // Retenção (nd exato) e DEP M0 vêm das tabelas por canal — mesma fonte dos cards.
  const rsel = (retCh || []).filter(c => inSel(c.channel));
  const nd = (n, d) => {
    let N = 0,
      D = 0;
    rsel.forEach(c => {
      if (c.nd) {
        N += c.nd[n] || 0;
        D += c.nd[d] || 0;
      }
    });
    return D > 0 ? N / D : null;
  };
  const dsel = (depCh || []).filter(c => inSel(c.channel));
  const depM0Total = dsel.reduce((a, c) => a + (c.depM0 || 0), 0);
  const depM0Growth = dsel.filter(c => isGrowthCh_(c.channel)).reduce((a, c) => a + (c.depM0 || 0), 0);
  const mk = (m, act, m1) => ({
    ...m,
    act: act == null ? null : act,
    m1: m1 === undefined ? null : m1
  });
  const out = {
    ...M,
    ftdAmount: mk(M.ftdAmount, ftdAmt || null, lFtdAmt || null),
    roasFtd: mk(M.roasFtd, div(ftdAmt, spend), div(lFtdAmt, lSpend)),
    invest: mk(M.invest, spend || null, lSpend || null),
    ggr: mk(M.ggr, ngr || null, lNgr || null),
    ggrPerDep: mk(M.ggrPerDep, div(ngr, dep), div(lNgr, lDep)),
    depTotal: mk(M.depTotal, dep || null, lDep || null),
    qtdDep: mk(M.qtdDep, sum('mtd', 'qtdDep') || null, sum('lm', 'qtdDep') || null),
    turnover: mk(M.turnover, turn || null, lTurn || null),
    hold: mk(M.hold, div(ngr, turn), div(lNgr, lTurn)),
    rollover: mk(M.rollover, div(turn, dep), div(lTurn, lDep)),
    ggrTrend: mk(M.ggrTrend, trendF != null && ngr ? ngr * trendF : null, null),
    retM0M1: mk(M.retM0M1, nd('n1', 'd1'), null),
    retM1M2: mk(M.retM1M2, nd('n2', 'd2'), null),
    retM3plus: mk(M.retM3plus, nd('n3', 'd3'), null),
    depM0Total: mk(M.depM0Total, depM0Total || null, null),
    depM0Growth: mk(M.depM0Growth, depM0Growth || null, null)
  };
  return applyBpLive_(out, filter, bp);
}

// Farol — métricas DERIVADAS p/ a aba consolidada (não estão no M do backend): CAC, Tkt FTD, ROAS Dep
// D0/M0, FreeSpins/Dep, Bonif/Dep. Calcula no escopo do filtro (igual aos outros cards). M-1 de CAC/Tkt
// vem de componentsByChannel (ftdQty mtd+lm, só live; mock cai p/ channels e fica sem Δ). M-1 de ROAS Dep
// D0 e FreeSpins/Bonif = dep_d0/freespin/bonus do mês anterior POR CANAL (depD0Lm/freespinLm/bonusLm do

function buildFarolMetrics_(M, comp, channels, ggrChannels, bp, filter) {
  const sel = chList_(filter);

    if (!comp) return null;

      any = false;

      const v = comp[ch] && comp[ch][bk] && comp[ch][bk][key];

      }

  };
  const chFtdQty = (channels || []).filter(c => inSel(c.channel)).reduce((a, c) => a + (c.ftdQty || 0), 0) || null;

  const depD0M = (channels || []).filter(c => inSel(c.channel) && c.spend != null).reduce((a, c) => a + (c.depD0 || 0), 0) || null;
  // M-1 (mesma janela, mês anterior) de Dep D0 por canal — backend expõe depD0Lm em channels (CACHE v28+).
  const depD0Lm = (channels || []).filter(c => inSel(c.channel) && c.spend != null).reduce((a, c) => a + (c.depD0Lm || 0), 0) || null;
  const fs = (ggrChannels || []).filter(c => inSel(c.channel)).reduce((a, c) => a + (c.freespin || 0), 0) || null;
  const bn = (ggrChannels || []).filter(c => inSel(c.channel)).reduce((a, c) => a + (c.bonus || 0), 0) || null;
  // M-1 (mesma janela, mês anterior) de freespin/bonus por canal — backend expõe freespinLm/bonusLm em ggrChannels (CACHE v27+).
  const fsLm = (ggrChannels || []).filter(c => inSel(c.channel)).reduce((a, c) => a + (c.freespinLm || 0), 0) || null;
  const bnLm = (ggrChannels || []).filter(c => inSel(c.channel)).reduce((a, c) => a + (c.bonusLm || 0), 0) || null;
  const byCh = bp && bp.byChannel || {};

  // diário do plano é front-loaded (runway da coorte), então somar poucos dias contra invest flat INFLA
  // a razão (jul 1-5 = 2,35 vs mês inteiro = 1,9). Total Casa = m0tt/invest; Growth/canal = Dep M0 Growth(colZ)/invest(colN).
  const bpM = bp && bp.month || null;

        iv = 0;

        const b = bpM.byChannel && bpM.byChannel[ch];
        if (b) {
          dm += b.depM0 || 0;

        }
      });
      if (iv > 0) roasDepM0Bp = dm / iv;
    } else if (filter && filter.scope === 'growth') {
      const g = bpM.growthAgg || {};
      if (g.invest > 0) roasDepM0Bp = (g.depM0 || 0) / g.invest;
    } else {

  return {
    cac: mk('CAC', 'brl', div(inv.act, ftdQtyM), div(B.invest, B.ftd), div(inv.m1, ftdQtyL), true),
    // custo: menor=melhor
    ticketFtd: mk('Tkt Médio FTD', 'brl', div(fa.act, ftdQtyM), div(B.ftdAmount, B.ftd), div(fa.m1, ftdQtyL)),
    roasDepD0: mk('ROAS Dep D0', 'multiple', div(depD0M, inv.act), div(B.depD0, B.invest), div(depD0Lm, inv.m1)),

    roasDepM0: mk('ROAS Dep M0', 'multiple', div(dm0.act, inv.act), roasDepM0Bp, div(dm0.m1, inv.m1)),

    freespinDep: mk('FreeSpins / Dep', 'pct', div(fs, dt.act), 0.02, div(fsLm, dt.m1), true),

}

// Recalcula bp/pctBp dos hero cards conforme o escopo (growth ou canal específico).
// Aquisição + DEP M0 vêm do BP per-canal; Depósitos Totais espelha o M0 (= "same as M0") em qualquer escopo; GGR não tem BP por canal → farol off.
function applyBpLive_(out, filter, bp) {
  if (!bp) return out;
  const list = chList_(filter);
  let sel;
  if (list.length) {
    sel = {};
    list.forEach(ch => {
      const b = bp.byChannel && bp.byChannel[ch];
      if (b) ['invest', 'ftdAmount', 'depD0', 'ftd', 'depM0'].forEach(k => {
        if (b[k] != null) sel[k] = (sel[k] || 0) + b[k];
      });
    });
  } else if (filter.scope === 'growth') sel = bp.growthAgg || {};else return out; // total: mantém o BP do backend
  const setM = (m, bpVal) => {
    if (!m) return m;
    const v = bpVal != null && isFinite(bpVal) && bpVal !== 0 ? bpVal : null;
    return {
      ...m,
      bp: v,
      pctBp: v && m.act != null ? m.act / v : null
    };
  };
  out.invest = setM(out.invest, sel.invest);
  out.ftdAmount = setM(out.ftdAmount, sel.ftdAmount);
  out.roasFtd = setM(out.roasFtd, sel.ftdAmount && sel.invest ? sel.ftdAmount / sel.invest : null);
  out.depM0Growth = setM(out.depM0Growth, sel.depM0);
  out.depM0Total = setM(out.depM0Total, sel.depM0);
  out.depTotal = setM(out.depTotal, sel.depM0); // Depósitos Totais = M0 também no escopo canal/growth (mês 1)
  // Sem BP per-canal: zera o farol pra não mostrar BP de Total da Casa no escopo errado.
  out.ggr = {
    ...out.ggr,
    bp: null,
    pctBp: null
  };
  out.ggrPerDep = {
    ...out.ggrPerDep,
    bp: null,
    pctBp: null
  };
  out.ggrTrend = {
    ...out.ggrTrend,
    bp: null,
    pctBp: null
  };
  // Retenção: BP do plano é só Total da Casa (não há plano por canal) → farol off em canal/growth.
  out.retM0M1 = {
    ...out.retM0M1,
    bp: null,
    pctBp: null
  };
  out.retM1M2 = {
    ...out.retM1M2,
    bp: null,
    pctBp: null
  };
  out.retM3plus = {
    ...out.retM3plus,
    bp: null,
    pctBp: null
  };
  return out;
}

// Seleciona a série da safra diária conforme o filtro (novo shape {all,growth,byChannel} ou mock {totals,rows}).
function selectDailyCohort_(dc, filter) {
  if (!dc) return null;
  if (dc.byChannel || dc.all || dc.growth) {
    const sel = chList_(filter);
    if (sel.length === 1) return dc.byChannel && dc.byChannel[sel[0]] || {
      totals: {},
      rows: []
    };
    if (sel.length > 1) {
      const series = sel.map(ch => dc.byChannel && dc.byChannel[ch]).filter(Boolean);
      return series.length ? sumDailyCohorts_(series) : {
        totals: {},
        rows: []
      };
    }
    if (filter.scope === 'growth') return dc.growth || {
      totals: {},
      rows: []
    };
    return dc.all || {
      totals: {},
      rows: []
    };
  }
  return dc; // mock antigo {totals, rows}
}

// Soma várias séries de safra diária (byChannel) por dia, recompondo as bases ADITIVAS e
// RECALCULANDO as razões — espelha assembleDailyCohort_ do backend. Requer as bases
